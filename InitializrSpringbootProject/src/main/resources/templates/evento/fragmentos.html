<!-- fragmento 1 para Agregar evento en ventana modal -->
<section th:fragment="agregar">
    <!-- Button trigger modal -->
    <div class='row py-4 mb-2 bg-light'>
        <div class='col-md-1'></div>
        <div class='col-md-3'>
            <button type="button" class="btn btn-primary" sec:authorize="hasRole('ROLE_ADMIN')"
                    data-bs-toggle="modal" data-bs-target="#agregarCategoriaModal">
                <i class="fa-solid fa-plus"></i> [[#{boton.agregar}]]</button>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="agregarCategoriaModal" tabindex="-1"
         aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">
                        <i class="fa-solid fa-layer-group"></i> [[#{evento.agregar}]]</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action='@{/evento/guardar}' th:object='${evento}'
                      class='was-validated' method="post">
                    <div class="modal-body">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" th:field="*{idEvento}"/>

                        <!-- nombre -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-tag me-1"></i> [[#{campo.nombre}]]
                            </label>
                            <input type="text" th:field="*{nombre}" class="form-control"
                                   th:placeholder="#{evento.nombre.placeholder}" maxlength="150" required/>
                            <div class="invalid-feedback" th:text="#{campo.requerido}"></div>
                        </div>

                        <!-- descripcion -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-align-left me-1"></i> [[#{campo.descripcion}]]
                            </label>
                            <textarea th:field="*{descripcion}" class="form-control" rows="3"
                                      th:placeholder="#{evento.descripcion.placeholder}"></textarea>
                        </div>

                        <!-- fecha -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-calendar me-1"></i> [[#{campo.fecha}]]
                            </label>
                            <input type="date" th:field="*{fecha}" class="form-control" required/>
                            <div class="invalid-feedback" th:text="#{campo.fecha.invalida}"></div>
                        </div>

                        <!-- capacidad -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-users me-1"></i> [[#{campo.capacidad}]]
                            </label>
                            <input type="number" th:field="*{capacidad}" class="form-control"
                                   min="1" th:placeholder="#{evento.capacidad.placeholder}" required/>
                            <div class="invalid-feedback" th:text="#{campo.numero.positivo}"></div>
                        </div>

                        <!-- activo -->
                        <div class="mb-2 form-check">
                            <input type="checkbox" th:field="*{activo}"
                                   class="form-check-input" id="activoModal"/>
                            <label class="form-check-label" for="activoModal" th:text="#{campo.activo}"></label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark"></i> [[#{boton.cerrar}]]</button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-floppy-disk"></i> [[#{boton.guardar}]]</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>


<!-- fragmento 2 para el listado de eventos -->
<section th:fragment="listado" class="p-3">
    <div class="row p-3">
        <div class="col-md-9">
            <div class="card p-2">
                <div class="card-header"><h4 th:text="#{evento.listado}"></h4></div>
                <div class="card-body">
                    <div th:if="${eventos != null and !eventos.empty}">
                        <table class="table table-striped table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>#</th>
                                    <th th:text="#{campo.nombre}"></th>
                                    <th th:text="#{campo.descripcion}"></th>
                                    <th th:text="#{campo.fecha}"></th>
                                    <th th:text="#{campo.capacidad}"></th>
                                    <th th:text="#{campo.activo}"></th>
                                    <th th:text="#{campo.acciones}"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="evento : ${eventos}">
                                    <td th:text="${evento.idEvento}"></td>
                                    <td th:text="${evento.nombre}"></td>
                                    <td th:text="${evento.descripcion}"></td>
                                    <td th:text="${evento.fecha}"></td>
                                    <td th:text="${evento.capacidad}"></td>
                                    <td>
                                        <span th:if="${evento.activo}" class="badge bg-success" th:text="#{campo.activo.si}"></span>
                                        <span th:unless="${evento.activo}" class="badge bg-secondary" th:text="#{campo.activo.no}"></span>
                                    </td>
                                    <td>
                                        <button type="button" class="btn btn-danger btn-sm"
                                                data-bs-toggle="modal" data-bs-target="#confirmModal"
                                                th:data-bs-id="${evento.idEvento}"
                                                th:data-bs-descripcion="${evento.nombre}">
                                            <i class="fa-solid fa-trash"></i> [[#{boton.eliminar}]]
                                        </button>
                                        <a th:href="@{/evento/modificar/{idEvento}(idEvento=${evento.idEvento})}" class="btn btn-warning btn-sm">
                                            <i class="fas fa-pencil-alt"></i> [[#{boton.actualizar}]]
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table></div>
                    <div class="text-center p-2" th:if="${eventos == null or eventos.empty}">
                        <span th:text="#{lista.vacia}"></span></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center bg-success text-white mb-3">
                <div class="card-body"><h3 th:text="#{evento.total}"></h3>
                    <h4 class="fs-2"><i class="fas fa-layer-group"></i> [[${totalEventos}]]</h4>
                </div></div>
        </div>
    </div>
</section>

<!-- 3 Fragmento que se utiliza en la página modifca.html -->
<section th:fragment="editar">
    <div class="row">
        <div class="col-md-2"></div>
        <div class="col-md-8">
            <form method="POST" th:action="@{/evento/guardar}"
                  th:object="${evento}" class="was-validated">
                <input type="hidden" th:field="*{idEvento}"/>
                <div class="row py-4 mb-4 bg-light">
                    <div class="col-md-4 d-grid">
                        <a th:href="@{/evento/listado}" class="btn btn-primary">
                            <i class="fas fa-arrow-left"></i> [[#{accion.regresar}]]</a>
                    </div>
                    <div class="col-md-4 d-grid">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-check"></i> [[#{accion.guardar}]]</button>
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <div class="card">
                            <div class="card-header"><h4>[[#{accion.actualizar}]]</h4></div>
                            <div class="card-body">

                                <!-- nombre -->
                                <div class="mb-3">
                                    <label th:for="nombre" class="form-label">
                                        <i class="fa-solid fa-tag me-1"></i> [[#{campo.nombre}]]
                                    </label>
                                    <input type="text" class="form-control"
                                           th:field="*{nombre}" maxlength="150" required/>
                                    <div class="invalid-feedback" th:text="#{campo.requerido}"></div>
                                </div>

                                <!-- descripcion -->
                                <div class="mb-3">
                                    <label th:for="descripcion" class="form-label">
                                        <i class="fa-solid fa-align-left me-1"></i> [[#{campo.descripcion}]]
                                    </label>
                                    <textarea class="form-control" th:field="*{descripcion}" rows="3"></textarea>
                                </div>

                                <!-- fecha -->
                                <div class="mb-3">
                                    <label th:for="fecha" class="form-label">
                                        <i class="fa-solid fa-calendar me-1"></i> [[#{campo.fecha}]]
                                    </label>
                                    <input type="date" class="form-control"
                                           th:field="*{fecha}" required/>
                                    <div class="invalid-feedback" th:text="#{campo.fecha.invalida}"></div>
                                </div>

                                <!-- capacidad -->
                                <div class="mb-3">
                                    <label th:for="capacidad" class="form-label">
                                        <i class="fa-solid fa-users me-1"></i> [[#{campo.capacidad}]]
                                    </label>
                                    <input type="number" class="form-control"
                                           th:field="*{capacidad}" min="1" required/>
                                    <div class="invalid-feedback" th:text="#{campo.numero.positivo}"></div>
                                </div>

                                <!-- activo -->
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input"
                                           th:field="*{activo}" id="activoEditar"/>
                                    <label class="form-check-label" for="activoEditar"
                                           th:text="#{campo.activo}"></label>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>

<!-- 4 fragmento que se utiliza para confirmar que se desea eliminar un evento -->
<section th:fragment="confirmarEliminar">
    <div class="modal fade" 
         id="confirmModal" 
         tabindex="-1" 
         aria-labelledby="modalLabel" 
         aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered custom-modal-animation">
            <div class="modal-content animate-slide-up">
                <form th:action="@{/evento/eliminar}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="idEvento" id="modalId"/>
                    <div class="modal-header bg-warning text-white">
                        <h5 class="modal-title" id="modalLabel">
                            <i class="fa-solid fa-circle-radiation"></i> [[#{accion.confirmar}]]
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <div class="modal-body">
                        <p>[[#{accion.confirmar.texto1}]] <span id="modalDescripcion"></span>?</p>
                        <h6>[[#{accion.confirmar.texto2}]]</h6>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-danger">
                            <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                        </button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
