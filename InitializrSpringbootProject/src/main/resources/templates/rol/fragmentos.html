<!-- Fragmento 1: modal para agregar rol -->
<section th:fragment="agregar">
    <div class="row py-4 mb-2 bg-light">
        <div class="col-md-1"></div>
        <div class="col-md-3">
            <button type="button" class="btn btn-primary"
                    data-bs-toggle="modal" data-bs-target="#agregarRolModal">
                <i class="fa-solid fa-plus"></i> [[#{rol.agregar}]]
            </button>
        </div>
    </div>

    <div class="modal fade" id="agregarRolModal" tabindex="-1"
         aria-labelledby="agregarRolLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title" id="agregarRolLabel">
                        <i class="fas fa-user-tag"></i> [[#{rol.agregar}]]
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/rol/guardar}" th:object="${rol}" method="post" class="was-validated">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" th:field="*{idRol}"/>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">[[#{campo.nombre}]]</label>
                            <input type="text" th:field="*{rol}" class="form-control"
                                   maxlength="100" required/>
                            <div class="invalid-feedback" th:text="#{campo.requerido}"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark"></i> [[#{boton.cerrar}]]
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-floppy-disk"></i> [[#{boton.guardar}]]
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

<!-- Fragmento 2: tabla listado de roles -->
<section th:fragment="listado" class="p-3">
    <div class="row p-3">
        <div class="col-md-9">
            <div class="card p-2">
                <div class="card-header"><h4 th:text="#{rol.listado}"></h4></div>
                <div class="card-body">
                    <div th:if="${roles != null and !roles.empty}">
                        <table class="table table-striped table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>#</th>
                                    <th th:text="#{campo.nombre}"></th>
                                    <th th:text="#{campo.acciones}"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="r : ${roles}">
                                    <td th:text="${r.idRol}"></td>
                                    <td th:text="${r.rol}"></td>
                                    <td>
                                        <a th:href="@{/rol/modificar/{idRol}(idRol=${r.idRol})}"
                                           class="btn btn-warning btn-sm">
                                            <i class="fas fa-pencil-alt"></i> [[#{boton.actualizar}]]
                                        </a>
                                        <button type="button" class="btn btn-danger btn-sm"
                                                data-bs-toggle="modal" data-bs-target="#confirmModal"
                                                th:data-bs-id="${r.idRol}"
                                                th:data-bs-descripcion="${r.rol}">
                                            <i class="fa-solid fa-trash"></i> [[#{boton.eliminar}]]
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="text-center p-2" th:if="${roles == null or roles.empty}">
                        <span th:text="#{lista.vacia}"></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center bg-secondary text-white mb-3">
                <div class="card-body">
                    <h3 th:text="#{rol.total}"></h3>
                    <h4 class="fs-2"><i class="fas fa-user-tag"></i> [[${totalRoles}]]</h4>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Fragmento 3: formulario editar rol -->
<section th:fragment="editar">
    <div class="row">
        <div class="col-md-2"></div>
        <div class="col-md-8">
            <form method="POST" th:action="@{/rol/guardar}" th:object="${rol}" class="was-validated">
                <input type="hidden" th:field="*{idRol}"/>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="row py-4 mb-4 bg-light">
                    <div class="col-md-4 d-grid">
                        <a th:href="@{/rol/listado}" class="btn btn-primary">
                            <i class="fas fa-arrow-left"></i> [[#{accion.regresar}]]
                        </a>
                    </div>
                    <div class="col-md-4 d-grid">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-check"></i> [[#{accion.guardar}]]
                        </button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h4 th:text="#{rol.editar}"></h4></div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">[[#{campo.nombre}]]</label>
                            <input type="text" th:field="*{rol}" class="form-control"
                                   maxlength="100" required/>
                            <div class="invalid-feedback" th:text="#{campo.requerido}"></div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>

<!-- Fragmento 4: modal confirmar eliminación -->
<section th:fragment="confirmarEliminar">
    <div class="modal fade" id="confirmModal" tabindex="-1"
         aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/rol/eliminar}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="idRol" id="modalId"/>
                    <div class="modal-header bg-warning text-white">
                        <h5 class="modal-title" id="modalLabel">
                            <i class="fa-solid fa-circle-radiation"></i> [[#{accion.confirmar}]]
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>[[#{accion.confirmar.texto1}]] <span id="modalDescripcion"></span>?</p>
                        <h6>[[#{accion.confirmar.texto2}]]</h6>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-danger">
                            <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                        </button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
