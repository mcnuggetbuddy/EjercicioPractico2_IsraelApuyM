<!-- 1 Fragmento que se utiliza en la página para registrar nuevo usuario -->
<section th:fragment="nuevoUsuario">
    <div class="row py-2 justify-content-center">
        <div class="col-md-3">
            <div class="col-md-4 d-grid">
                <a th:href="@{/login}" class="btn btn-primary">
                    <i class="fas fa-arrow-left"></i> [[#{accion.regresar}]]
                </a>
            </div>
        </div>
    </div>
    <div class="row py-2 justify-content-center">
        <div class="col-md-3">
            <form method="POST" th:action="@{/registro/crearUsuario}" th:object="${usuario}" class="was-validated">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="card">
                    <div class="card-header">
                        <h4>[[#{usuario.agregar}]]</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">[[#{campo.email}]]</label>
                            <input type="email" class="form-control" th:field="*{email}" maxlength="200" required/>
                            <div class="invalid-feedback" th:text="#{campo.requerido}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">[[#{campo.nombre}]]</label>
                            <input type="text" class="form-control" th:field="*{nombre}" maxlength="150" required/>
                            <div class="invalid-feedback" th:text="#{campo.requerido}"></div>
                        </div>
                    </div>
                    <div class="card-footer text-end">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-envelope"></i> [[#{usuario.activacion}]]
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>

<!-- 2 Fragmento que se utiliza para activar un usuario -->
<section th:fragment="activarUsuario">
    <div class="row py-2 justify-content-center">
        <div class="col-md-3">
            <form method="POST" th:action="@{/registro/activar}" th:object="${usuario}" class="was-validated">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:field="*{idUsuario}"/>
                <div class="card">
                    <div class="card-header align-items-center">
                        <h4>[[#{registro.activar}]]</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">[[#{campo.nombre}]]</label>
                            <input type="text" class="form-control" th:field="*{nombre}" maxlength="150" required/>
                            <div class="invalid-feedback" th:text="#{campo.requerido}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">[[#{campo.email}]]</label>
                            <input type="email" class="form-control" th:field="*{email}" maxlength="200" required/>
                            <div class="invalid-feedback" th:text="#{campo.email.invalido}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">[[#{campo.password}]]</label>
                            <input type="password" class="form-control" th:field="*{password}" maxlength="255" required/>
                            <div class="invalid-feedback" th:text="#{campo.requerido}"></div>
                        </div>
                    </div>
                    <div class="card-footer align-items-center">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-check"></i> [[#{usuario.activacion}]]
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>

<!-- 3 Fragmento que se utiliza para recordar contraseña -->
<section th:fragment="recordarUsuario">
    <div class="row py-2 justify-content-center">
        <div class="col-md-3">
            <div class="col-md-4 d-grid">
                <a th:href="@{/login}" class="btn btn-primary">
                    <i class="fas fa-arrow-left"></i> [[#{accion.regresar}]]
                </a>
            </div>
        </div>
    </div>
    <div class="row py-2 justify-content-center">
        <div class="col-md-3">
            <form method="POST" th:action="@{/registro/recordarUsuario}" th:object="${usuario}" class="was-validated">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="card">
                    <div class="card-header">
                        <h4>[[#{registro.recordar.titulo}]]</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">[[#{campo.nombre}]]</label>
                            <input type="text" class="form-control" th:field="*{nombre}" maxlength="150"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">[[#{campo.email}]]</label>
                            <input type="email" class="form-control" th:field="*{email}" maxlength="200"/>
                        </div>
                    </div>
                    <div class="card-footer text-end">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-address-card"></i> [[#{registro.recordar.boton}]]
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>

<!-- 4 Fragmento que se utiliza para mostrar las salidas de las acciones -->
<section th:fragment="salidaRegistro">
    <div class="row py-2 justify-content-center">
        <div class="col-md-3">
            <div class="card">
                <div class="card-header align-items-center">
                    [[${titulo}]]
                </div>
                <div class="card-body">
                    <strong>[[${mensaje}]]</strong>
                </div>
            </div>
        </div>
    </div>
</section>
